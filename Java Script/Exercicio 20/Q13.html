<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 13</title></head>
<body>
    <script>
        let numStr = prompt("Digite um número inteiro:");
        let i = 0;
        document.write("Dígitos separados:<br>");
        while (i < numStr.length) {
            document.write(numStr.charAt(i) + "<br>");
            i++;
        }
    </script>
</body>
</html>
