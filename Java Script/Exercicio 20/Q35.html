<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 35</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        document.write("<h3>Tabuada do " + num + "</h3>");
        for (let i = 1; i <= 10; i++) {
            document.write(num + " x " + i + " = " + (num * i) + "<br>");
        }
    </script>
</body>
</html
