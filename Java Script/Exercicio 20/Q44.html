<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 44</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número para o fatorial:"));
        let fatorial = 1;
        for (let i = num; i > 1; i--) {
            fatorial *= i;
        }
        document.write("O fatorial é: " + fatorial);
    </script>
</body>
</html>
