<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 37</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número inteiro:"));
        let divisores = 0;
        
        for (let i = 1; i <= num; i++) {
            if (num % i === 0) {
                divisores++;
            }
        }
        
        if (divisores === 2) {
            document.write(num + " é um número primo.");
        } else {
            document.write(num + " não é um número primo.");
        }
    </script>
</body>
</html>
