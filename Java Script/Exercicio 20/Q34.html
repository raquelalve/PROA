<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 34</title></head>
<body>
    <script>
        let soma = 0;
        for (let i = 1; i <= 5; i++) {
            let num = parseInt(prompt("Digite o " + i + "º número inteiro:"));
            soma += num;
        }
        document.write("Média aritmética: " + (soma / 5));
    </script>
</body>
</html>
