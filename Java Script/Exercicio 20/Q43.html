<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 43</title></head>
<body>
    <script>
        let numStr = prompt("Digite um número:");
        document.write("Dígitos isolados:<br>");
        for (let i = 0; i < numStr.length; i++) {
            document.write(numStr.charAt(i) + "<br>");
        }
    </script>
</body>
</html>
