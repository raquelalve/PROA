<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 41</title></head>
<body>
    <script>
        let limite = parseInt(prompt("Digite o número limite:"));
        let soma = 0;
        for (let i = 1; i <= limite; i++) {
            if (i % 2 === 0) {
                soma += i;
            }
        }
        document.write("Soma dos pares: " + soma);
    </script>
</body>
</html>
