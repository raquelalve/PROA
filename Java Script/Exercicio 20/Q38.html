<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 38</title></head>
<body>
    <script>
        let limite = parseInt(prompt("Digite o limite para Fibonacci:"));
        document.write("Sequência: ");
        for (let t1 = 0, t2 = 1; t1 <= limite; ) {
            document.write(t1 + " ");
            let prox = t1 + t2;
            t1 = t2;
            t2 = prox;
        }
    </script>
</body>
</html>
