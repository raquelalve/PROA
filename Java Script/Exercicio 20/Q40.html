<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 40</title></head>
<body>
    <script>
        let t1 = 0, t2 = 1;
        document.write("Os 20 Primeiros Fibonacci:<br>");
        for (let contador = 1; contador <= 20; contador++) {
            document.write(t1 + " ");
            let prox = t1 + t2;
            t1 = t2;
            t2 = prox;
        }
    </script>
</body>
</html>
