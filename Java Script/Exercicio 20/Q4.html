<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 4</title></head>
<body>
    <script>
        let soma = 0;
        let contador = 1;
        while (contador <= 5) {
            let num = parseInt(prompt("Digite o " + contador + "º número inteiro:"));
            soma += num;
            contador++;
        }
        let media = soma / 5;
        document.write("Média aritmética: " + media);
    </script>
</body>
</html>
