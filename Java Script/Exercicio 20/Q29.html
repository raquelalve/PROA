<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 29</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número para o fatorial:"));
        let fatorial = 1;
        let i = num;
        do {
            if(i > 1) {
                fatorial *= i;
                i--;
            }
        } while (i > 1);
        document.write("Fatorial: " + fatorial);
    </script>
</body>
</html>
