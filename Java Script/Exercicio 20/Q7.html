<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 7</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número inteiro:"));
        let i = 1;
        let divisores = 0;
        
        while (i <= num) {
            if (num % i === 0) {
                divisores++;
            }
            i++;
        }
        
        if (divisores === 2) {
            document.write(num + " é um número primo.");
        } else {
            document.write(num + " não é um número primo.");
        }
    </script>
</body>
</html>
