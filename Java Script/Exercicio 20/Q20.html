<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 20</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let i = 1;
        document.write("<h3>Tabuada do " + num + "</h3>");
        do {
            document.write(num + " x " + i + " = " + (num * i) + "<br>");
            i++;
        } while (i <= 10);
    </script>
</body>
</html>
