<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 5</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número para ver a tabuada:"));
        let i = 1;
        document.write("<h3>Tabuada do " + num + "</h3>");
        while (i <= 10) {
            document.write(num + " x " + i + " = " + (num * i) + "<br>");
            i++;
        }
    </script>
</body>
</html>
