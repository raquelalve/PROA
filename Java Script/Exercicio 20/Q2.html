<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 2</title></head>
<body>
    <script>
        let soma = 0;
        let i = 1;
        while (i <= 100) {
            soma += i;
            i++;
        }
        document.write("Soma de 1 a 100: " + soma);
    </script>
</body>
</html>
