<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 19</title></head>
<body>
    <script>
        let soma = 0;
        let contador = 1;
        do {
            let num = parseInt(prompt("Digite o " + contador + "º número inteiro:"));
            soma += num;
            contador++;
        } while (contador <= 5);
        document.write("Média aritmética: " + (soma / 5));
    </script>
</body>
</html>
