<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 36</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número positivo:"));
        document.write("Divisores: ");
        for (let i = 1; i <= num; i++) {
            if (num % i === 0) {
                document.write(i + " ");
            }
        }
    </script>
</body>
</html>
