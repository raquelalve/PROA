<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 6</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número inteiro positivo:"));
        let i = 1;
        document.write("Divisores de " + num + ": ");
        while (i <= num) {
            if (num % i === 0) {
                document.write(i + " ");
            }
            i++;
        }
    </script>
</body>
</html>
