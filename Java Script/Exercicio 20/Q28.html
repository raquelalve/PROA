<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 28</title></head>
<body>
    <script>
        let numStr = prompt("Digite um número:");
        let i = 0;
        document.write("Dígitos:<br>");
        do {
            document.write(numStr.charAt(i) + "<br>");
            i++;
        } while (i < numStr.length);
    </script>
</body>
</html>
