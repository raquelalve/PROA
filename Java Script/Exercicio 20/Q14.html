<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Exercício 14</title></head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número para calcular o fatorial:"));
        let fatorial = 1;
        let i = num;
        
        while (i > 1) {
            fatorial *= i;
            i--;
        }
        document.write("O fatorial de " + num + " é: " + fatorial);
    </script>
</body>
</html>
