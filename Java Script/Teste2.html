<h1> Testando comandos usando javascript</h1>

<script>
 let nome= "Debora" //variável do tipo spring (letras, números e caracteres especies)
 let idade = 53 // variavel do tipo int (valores numericos inteiros)
 let altura = 1.78 // variavel do tipo floar (valores quebrados)
 let salario = 38000.55 // variavel do tipo double (valores que usam muito espaço em memória)
 let mestrado =  false //variavel do tipo boolean (verdadeiro ou falso)

 document.write ("<br>Meu nome é:" + nome)
 document.write ("<br>Minha idade é:" + idade)
 document.write ("<br>Minha altura é:" + altura)
 document.write ("<br>Meu salario é:" + salario)
 document.write ("<br>Meu mestrado é:" + mestrado)
