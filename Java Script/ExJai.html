<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>

<script>
let  a = +prompt ("Digite o valor de A:");
let operacao = prompt("Digite o operador +, -, *, /:");
let  c = +prompt ("Digite o valor de C:");


if (operacao === "+") {
  document.write (a + c)
}

if (operacao === "-") {
  alert (a - c)
}

if (operacao === "*") {
  alert (a * c)
}

if (operacao === "/") {
  alert (a / c)
}


</script>

</body>
</html>
