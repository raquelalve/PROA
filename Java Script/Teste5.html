<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media dos alunos</title>
</head>
<body>
   
    <h1>Media dos alunos</h1>

    <script>

  let numero1 = prompt ("entre com o primeiro número")
    document.write ("<br> A primeira nota número é:" + numero1)

    let numero2 = prompt ("entre com o primeiro número")
    document.write ("<br> A segunda nota número é:" + numero2)

    let numero3 = prompt ("entre com o primeiro número")
    document.write ("<br> A terceira nota número é:" + numero3)

    let numero4 = prompt ("entre com o primeiro número")
    document.write ("<br> A quarta nota número é:" + numero4)

    let media = (numero1 + numero2 + numero3 + numero4) /4
    document.write ("<br> A media dos números é:" + media)


    </script>




</body>
</html>
