<h1> Programa que imprimi média aritmética e média</h1>

<script>
let media1 = (8 + 9 + 7) / 3;

let media2 = (4 + 5 + 6) / 3;

let somaDasMedias = media1 + media2;

document.write("A média de 8, 9 e 7 é: " + media1 + "<br>");
document.write("A média de 4, 5 e 6 é: " + media2 + "<br>");
document.write("A soma das duas médias é: " + somaDasMedias);
</script>
