<h1>Algoritmo que lê um número inteiro</h1>

<script>
let numero = parseInt(prompt("Digite um número:"));
    let antecessor = (numero - 1);
    let sucessor = (numero + 1);
    
    document.write("Número digitado: " + numero + "<br>" + "Antecessor: " + antecessor + "<br>" + "Sucessor: " + sucessor );
</script>
