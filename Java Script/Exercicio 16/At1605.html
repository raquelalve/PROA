<h1>Algoritmo salário minimo</h1>

<script> 
let salariominimo = 788;

let usuario = Number(prompt("Informe o salário atual:"));

let subtotal = (usuario / salariominimo);

document.write("O resultado é: " + subtotal.toFixed(2));

</script>
