<body>

<h1>Informar um saldo e imprimir o saldo com reajuste de 1%</h1>

<script>
let saldo = Number(prompt("Informe o saldo atual:"));

let reajuste = saldo * 0.01;
let novoSaldo = saldo + reajuste;

document.write("O saldo com reajuste de 1% é: " + novoSaldo);
</script>

    
</body>
