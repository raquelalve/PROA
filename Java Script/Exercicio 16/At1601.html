<h1> Algoritmo de uma idade expressa em anos </h1>

<script> 
let anos  = Number(prompt("Digite quantos anos você tem:"));
let meses = Number(prompt("Digite quantos meses você tem::"));
let dias  = Number(prompt("Digite qunatos dias você tem::"));

let totalDias = (anos * 365) + (meses * 30) + dias;

document.write("O total de dias é:"  + totalDias)
</script>
