<body>
    
<h1>Algoritmo peças e valor total </h1>

<script>
let ipi = Number(prompt("Digite a porcentagem do IPI:"));
let codigoPeça1 = Number(prompt("Digite o código da peça 1:"));
let valorPeça1 = Number(prompt("Digite o valor unitário da peça 1:"));
let quantPeça1 = Number(prompt("Digite a quantidade de peças 1:"));

let codigoPeça2 = Number(prompt("Digite o código da peça 2:"));
let valorPeça2 = Number(prompt("Digite o valor unitário da peça 2:"));
let quantPeça2 = Number(prompt("Digite a quantidade de peças 2:"));

let subtotal = (valorPeça1 * quantPeça1) + (valorPeça2 * quantPeça2);
let valortotal = subtotal * (ipi / 100 + 1);

document.write("o valor é: " + valortotal);

</script>
