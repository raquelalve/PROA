<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos usando javascript</title>
</head>
<body>

<h1>
    Testando cálculos usando javascript
</h1>

<script>
    let numero1 = prompt ("entre com o primeiro número")
    document.write ("O primeiro número é:" + numero1)
   
    let numero2 = prompt ("entre com o segundo número ")
    document.write ("<br> O segundo número é:" + numero2)

    let multiplicacao = numero1 * numero2
    document.write ("<br> A multiplicacao dos números é:" + multiplicacao)

    let divisao = numero1 / numero2
    document.write ("<br> A divisao dos números é:" + divisao)
    
    let soma = numero1 + numero2
    document.write ("<br> A soma dos números é:" + soma)

    let media = (numero1 + numero2) /2
    document.write ("<br> A media dos números é:" + media)

</script>

    
</body>
</html>
