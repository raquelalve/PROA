<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que encontra a pessoa mais nova</title>
</head>
<body>
    <script>
        let nomeMaisNovo = "";
        let idadeMaisNovo = null;

        for (let i = 1; i <= 10; i++) {
            let nome = prompt("Digite o nome da " + i + "ª pessoa:");
            let idade = parseInt(prompt("Digite a idade de " + nome + ":"));

            // Se for a primeira rodada ou se achar alguém mais novo
            if (idadeMaisNovo === null || idade < idadeMaisNovo) {
                idadeMaisNovo = idade;
                nomeMaisNovo = nome;
            }
        }

        document.write("A pessoa mais nova é " + nomeMaisNovo + " com " + idadeMaisNovo + " anos.");
    </script>
</body>
</html>
