<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que calcula a soma das idades</title>
</head>
<body>
    <script>
        let somaIdades = 0;
        for (let i = 1; i <= 20; i++) {
            let idade = parseInt(prompt("Digite a idade da " + i + "ª pessoa:"));
            somaIdades += idade;
        }
        document.write("A soma de todas as idades é: " + somaIdades);
    </script>
</body>
</html>
