<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que conta números maiores que 8</title>
</head>
<body>
    <script>
        let maioresQueOito = 0;
        for (let i = 1; i <= 20; i++) {
            let numero = parseFloat(prompt("Digite o " + i + "º número de 20:"));
            if (numero > 8) {
                maioresQueOito++;
            }
        }
        document.write("Quantidade de números maiores que 8: " + maioresQueOito);
    </script>
</body>
</html>
