<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que lê números e mostra seus antecessores e seu sucessores</title>
</head>
<body>
    <script>
        let numero = parseInt(prompt("Digite un número inteiro:"));
        let antecessor = numero - 1;
        let sucessor = numero + 1;

        document.write("Número: " + numero + "<br>");
        document.write("Antecessor: " + antecessor + "<br>");
        document.write("Sucessor: " + sucessor + "<br>");
    </script>
</body>
</html>
