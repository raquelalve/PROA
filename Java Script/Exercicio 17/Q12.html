<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que calcula a soma dos números de 1 a 15</title>
</head>
<body>
    <script>
        let soma = 0;
        for (let i = 1; i <= 15; i++) {
            soma += i;
        }
        document.write("A soma dos números de 1 a 15 é: " + soma);
    </script>
</body>
</html>
