<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Média aritmética dos números 8, 9 e 7</title>
</head>
<body>
    <script>
        let media1 = (8 + 9 + 7) / 3;
        let media2 = (4 + 5 + 6) / 3;
        let somaMedias = media1 + media2;
        let mediaDasMedias = somaMedias / 2;

        document.write("Média de 8, 9 e 7: " + media1 + "<br>");
        document.write("Média de 4, 5 e 6: " + media2 + "<br>");
        document.write("Soma das duas médias: " + somaMedias + "<br>");
        document.write("Média das médias: " + mediaDasMedias + "<br>");
    </script>
</body>
</html>
