<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que calcula a soma dos 10 números</title>
</head>
<body>
    <script>
        let soma = 0;
        for (let i = 1; i <= 10; i++) {
            let numero = parseFloat(prompt("Digite o " + i + "º número:"));
            soma += numero;
        }
        document.write("A soma dos 10 números é: " + soma);
    </script>
</body>
</html>
