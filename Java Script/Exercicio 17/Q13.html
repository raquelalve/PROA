<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa que converte temperatura de Celsius para Fahrenheit</title>
</head>
<body>
    <script>
        let c = parseFloat(prompt("Digite a temperatura em Celsius (°C):"));
        let f = (9 * c + 160) / 5;

        document.write("Temperatura convertida: " + f.toFixed(1) + " °F");
    </script>
</body>
</html>
