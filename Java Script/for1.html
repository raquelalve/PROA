<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comando FOR</title>
</head>
<body>
    <h1>Testando Comando FOR</h1>
<script>
let tabuada = prompt ("Digite a tabuada desejada: ")

document.write ("1 X" + tabuada + " = " + tabuada * 1)
document.write ("2 X" + tabuada + " = " + tabuada * 2)
document.write ("3 X" + tabuada + " = " + tabuada * 3)
document.write ("4 X" + tabuada + " = " + tabuada * 4)
document.write ("5 X" + tabuada + " = " + tabuada * 5)
document.write ("6 X" + tabuada + " = " + tabuada * 6)
document.write ("7 X" + tabuada + " = " + tabuada * 7)
document.write ("8 X" + tabuada + " = " + tabuada * 8)
document.write ("9 X" + tabuada + " = " + tabuada * 9)
document.write ("10 X" + tabuada + " = " + tabuada * 10)

for(let n=1; n<=10; n++) {
document.write (n + " x " + tabuada + " = " + tabuada * n)
}

</script>


</body>
</html>
