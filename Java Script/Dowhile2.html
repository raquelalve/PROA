<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando o comando While</title>
</head>
<body>
    
<h1>Dowhile</h1>

<script>
        let n = 0
        let multiplicador = parseInt(prompt("Digite o número da tabuada que deseja: "))
 
        do {
            document.write(n + " x " + multiplicador + " = " + (n * multiplicador) + "<br>")
            n++
        } while (n <= 10)
    </script>
 
</body>
</html>
