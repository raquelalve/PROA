<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>10 Primeiros Números Maiores que 100</title>
</head>
<body>
    <script>
        document.write("<h2>Os 10 primeiros números maiores que 100:</h2>");
        
        for (let i = 101; i <= 110; i++) {
            document.write(i + " ");
        }
    </script>
</body>
</html>
