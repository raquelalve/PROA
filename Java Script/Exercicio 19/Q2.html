<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bomba Relógio</title>
</head>
<body>
    <script>
        let contador = 30;

        while (contador >= 0) {
            document.write(contador + "<br>");
            contador--; 
        }
        document.write("<h2>EXPLOSÃO</h2>");
    </script>
</body>
</html>
