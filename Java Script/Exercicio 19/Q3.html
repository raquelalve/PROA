<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ordem Decrescente (10 a 1)</title>
</head>
<body>
    <script>
        document.write("<h2>Ordem Decrescente:</h2>");
        
        for (let i = 10; i >= 1; i--) {
            if (i === 1) {
                document.write(i); 
            } else {
                document.write(i + ", ");
            }
        }
    </script>
</body>
</html>
