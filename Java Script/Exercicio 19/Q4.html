<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Média entre 15 e 100</title>
</head>
<body>
    <script>
        let soma = 0;
        let quantidade = 0;

        for (let i = 15; i <= 100; i++) {
            soma += i;
            quantidade++;
        }

        let media = soma / quantidade;
        document.write("<h2>A média aritmética dos números entre 15 e 100 é: " + media.toFixed(2) + "</h2>");
    </script>
</body>
</html>
