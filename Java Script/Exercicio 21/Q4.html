<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 04</title>
</head>
<body>
    <script>
        let totalPares = 0;
for (let i = 0; i < 5; i++) {
    let numero = parseInt(prompt(`Digite o ${i + 1}º número:`));
    if (numero % 2 === 0) {
        totalPares += 1;
    }
}
alert("A quantidade de números pares é: " + totalPares);
    </script>
</body>
</html>
