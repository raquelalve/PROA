<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 07</title>
</head>
<body>
    <script>
         let totalPositivos = 0;
        for (let i = 0; i < 10; i++) {
            if (parseInt(prompt(`Digite o ${i + 1}º número:`)) > 0) {
                totalPositivos++;
            }
        }
        alert("Quantidade de números positivos: " + totalPositivos);
    </script>
</body>
</html>
