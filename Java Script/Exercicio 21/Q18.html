<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18</title>
</head>
<body>
    <script>
      const m = [];
        let somaDiagonal = 0;
        
        for (let i = 0; i < 3; i++) {
            m[i] = [];
            for (let j = 0; j < 3; j++) {
                m[i][j] = parseInt(prompt(`Posição [${i}][${j}]:`));
                if (i === j) somaDiagonal += m[i][j];
            }
        }
        alert("Soma da diagonal principal: " + somaDiagonal);
    </script>
</body>
</html>
