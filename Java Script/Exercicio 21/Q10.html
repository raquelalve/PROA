<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    <script>
       let possuiZero = false;
        for (let i = 0; i < 5; i++) {
            if (parseInt(prompt(`Digite o ${i + 1}º número:`)) === 0) {
                possuiZero = true;
            }
        }
        alert(possuiZero ? "O número zero foi digitado!" : "Nenhum zero foi encontrado.");
    </script>
</body>
</html>
