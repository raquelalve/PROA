<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 21</title>
</head>
<body>
    <script>
        let somaTotal4x4 = 0;
        const totalCelulas = 16;
        
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 4; j++) {
                somaTotal4x4 += parseInt(prompt(`Insira o valor [${i}][${j}]:`));
            }
        }
        const mediaFinalMatriz = somaTotal4x4 / totalCelulas;
        alert("A média aritmética de todos os elementos é: " + mediaFinalMatriz);
    </script>
</body>
</html>
