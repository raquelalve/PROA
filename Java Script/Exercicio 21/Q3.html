<!DOCTYPE html>

    <title>Exercício 03</title>

<body>
    <script>
        let totalSoma = 0;
for (let i = 0; i < 7; i++) {
    totalSoma += parseInt(prompt(`Digite o ${i + 1}º número:`));
}
let media = totalSoma / 7;
alert("A média aritmética é: " + media);
    </script>
</body>
