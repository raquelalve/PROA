<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 25</title>
</head>
<body>
    <script>
        const grade = [];
        for(let i=0; i<4; i++) {
            grade[i] = [];
            for(let j=0; j<4; j++) grade[i][j] = parseInt(prompt(`Posição [${i}][${j}]:`));
        }
        
        let painelResultados = "Maiores valores encontrados:\n";
        grade.forEach((linha, indice) => {
            painelResultados += `Linha ${indice}: ${Math.max(...linha)}\n`;
        });
        
        alert(painelResultados);
    </script>
</body>
</html>
