<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 12</title>
</head>
<body>
    <script>
         const colecao = [];
        for (let i = 0; i < 5; i++) {
            colecao.push(parseInt(prompt(`Digite o ${i + 1}º número:`)));
        }
        colecao.sort((x, y) => y - x);
        alert("Valores em ordem decrescente: " + colecao.join(", "));
    </script>
</body>
</html>
