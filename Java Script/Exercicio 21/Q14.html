<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <script>
        const apenasPares = [];
        for (let i = 0; i < 7; i++) {
            const entrada = parseInt(prompt(`Digite o ${i + 1}º número:`));
            if (entrada % 2 === 0) apenasPares.push(entrada);
        }
        alert("Os números pares são: " + apenasPares.join(", "));
    </script>
</body>
</html>
