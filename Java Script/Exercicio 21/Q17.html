<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 17</title>
</head>
<body>
    <script>
       let somaElementos = 0;
        for (let i = 0; i < 2; i++) {
            for (let j = 0; j < 2; j++) {
                somaElementos += parseInt(prompt(`Posição [${i}][${j}] - Digite um número:`));
            }
        }
        alert("A soma de todos os elementos é: " + somaElementos);
    </script>
</body>
</html>
