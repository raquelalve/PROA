<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 20</title>
</head>
<body>
    <script>
         const itens = [];
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                itens.push(parseInt(prompt(`Valor [${i}][${j}]:`)));
            }
        }
        alert("O maior valor digitado foi: " + Math.max(...itens));
    </script>
</body>
</html>
