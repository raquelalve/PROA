<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 02</title>
</head>
<body>
    <script>
         let totalSoma = 0;
        for (let i = 0; i < 10; i++) {
            totalSoma += parseInt(prompt(`Digite o ${i + 1}º número:`));
        }
        alert("O resultado da soma é: " + totalSoma);
    </script>
</body>
</html>
