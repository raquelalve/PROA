<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>
</head>
<body>
    <script>
        const matriz3x3 = [];
        for (let i = 0; i < 3; i++) {
            matriz3x3[i] = [];
            for (let j = 0; j < 3; j++) {
                matriz3x3[i][j] = parseInt(prompt(`Matriz [${i}][${j}] - Digite um valor:`));
            }
        }
        let visualMatriz = "Matriz 3x3 digitada:\n";
        for (let i = 0; i < 3; i++) {
            visualMatriz += "[ " + matriz3x3[i].join(" | ") + " ]\n";
        }
        alert(visualMatriz);
    </script>
</body>
</html>
