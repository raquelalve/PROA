<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 15</title>
</head>
<body>
    <script>
          const listaNomes = [];
        for (let i = 0; i < 5; i++) {
            listaNomes.push(prompt(`Digite o ${i + 1}º nome:`));
        }
        alert("Nomes em ordem alfabética: " + listaNomes.sort().join(" -> "));
    </script>
</body>
