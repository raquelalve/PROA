<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segunda Aula</title>

    <style>

body{
background-color: rgb(227, 239, 252);
color: rgb(0, 0, 0);
font-size: 20px;
font-family: Verdana;
text-align: center;
background-image: url(Imagens/floresta\ tropical.jpg);
background-repeat: no-repeat; /* tira a repetição da imagem de fundo*/
background-size: cover; /*ajustar a imagem na área disponivel*/
background-attachment: fixed; /*fixa a imagem no pano do fundo*/
}

h1{
background-color: rgb(36, 73, 106);
color: rgb(255, 255, 255);
font-weight: 200; /*colocar ou retirar negrito-->*/
}

p{
background-color: rgb(180, 209, 246);
text-align: justify;
width: 300px;
height: 300px;
margin: 40px; /*Determina o tamanho da margemp/ os 4 lados do componente*/
margin-left: 30px; 
padding: 10px; /*espaço para dentro da área*/
border: 4px;
border-style: solid;
border-color: rgb(130, 130, 197);
border-radius: 10px; /* arredondamento de bordas*/
}

img{
width: 900px;
margin-top: 200px;
border: 10px dotted rgb(171, 196, 216)
}

hr{
width: 100%;
height: 3px;
background-color: rgb(161, 214, 255);
}
    </style>
</head>
