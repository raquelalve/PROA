<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tags Semânticas</title>
  <link rel="stylesheet" href="css/Atividade10.css" type="text/css" />
</head>
<body>


  <main class="container"> <!-- Conteúdo principal da página -->
      <header>
    <h1>TAG HEADER - Cabeçalho superior</h1>
  </header>
    <section class="lado-esquerdo">TAG SECTION - Lado esquerdo <!-- representa uma seção dentro de um documento  -->
      
      <nav> <!--representa links de navegação (menus)-->
        <h2>TAG NAV</h2>
      </nav>

      <aside> <!--por conceito, expressa um conteúdo a parte do conteúdo da página. 
        Na prática, pense em um box de informações dentro de uma página-->
        <h2>Publicidade</h2>
      </aside>

</section>

<section class="lado-direito"> TAG SECTION - Lado direito
    <article class="TAG-Article">TAG ARTICLE <!--expressa um elemento independente, ou seja, 
        que possa ser lido e interpretado sem depender do resto da página. 
        Um bom exemplo é uma notícia de jornal ou uma pergunta no Stackoverflow-->

      <h1>TAG H1 - TITULO do Article</h1>
      <p>
        Área para texto
      </p>

      <div class="area-imagem">
        Área para imagem
      </div>
</article>
    </section> 
      <footer>
    TAG FOOTER - Rodapé da página
  </footer> 
    
    
  </main>
</body>
</html>
